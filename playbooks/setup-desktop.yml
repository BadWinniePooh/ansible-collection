---
- name: Setup desktop environment
  hosts: all
  tags: not-supported-on-vagrant-docker
  become: true

  vars:
    ansible_user: "{{ my_hetzner_config.ansible_user.name }}"
    desktop_user_names: "{{ desktop_users | map(attribute='name') | list }}"

  pre_tasks:
    # TODO: smell - Update apt cache is duplicate in several playbooks
    - name: Update apt cache (if older than 1 hour)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

  handlers:
    # TODO: smell - cleanup apt cache is duplicate in several playbooks
    - name: Cleanup apt cache
      ansible.builtin.apt:
        autoremove: true
        autoclean: true

    - name: Restart XRDP
      ansible.builtin.service:
        name: xrdp
        state: restarted

  tasks:
    - name: Install console utilities
      ansible.builtin.apt:
        name:
          - curl
          - tree
          - unzip
        state: present
      notify: Cleanup apt cache

    - name: Install minimal GNOME desktop
      ansible.builtin.apt:
        name:
          - dbus-x11
          - python3-full
        state: present
      notify: Cleanup apt cache

    - name: Install XFCE extras and developer tools
      ansible.builtin.apt:
        name:
          - build-essential
          - libsecret-tools
          - seahorse
        state: present
      notify: Cleanup apt cache

    - name: Install .NET SDK
      ansible.builtin.apt:
        name:
          - dotnet-sdk-8.0
          - dotnet-sdk-10.0
        state: present
      notify: Cleanup apt cache

    - name: Install Firefox
      ansible.builtin.apt:
        name: firefox
        state: present
      notify: Cleanup apt cache

    - name: Remove apt-installed gh (migrating to Homebrew)
      ansible.builtin.apt:
        name: gh
        state: absent
      notify: Cleanup apt cache

    - name: Remove GitHub CLI apt source list
      ansible.builtin.file:
        path: /etc/apt/sources.list.d/github-cli.list
        state: absent

    - name: Remove GitHub CLI apt keyring
      ansible.builtin.file:
        path: /etc/apt/keyrings/githubcli-archive-keyring.gpg
        state: absent

    # Security: fetched over HTTPS; no additional checksum verification per project policy
    # Installs to the system-wide prefix /home/linuxbrew/.linuxbrew.
    # Must NOT run as root — the installer uses sudo internally. become: false overrides
    # the play-level become: true so the task runs as the Ansible connection user (who has sudo).
    - name: Install Homebrew
      ansible.builtin.shell:
        cmd: NONINTERACTIVE=1 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
        creates: /home/linuxbrew/.linuxbrew/bin/brew
      become: false

    - name: Configure Homebrew PATH for {{ desktop_user_names | join(', ') }}
      ansible.builtin.lineinfile:
        path: "/home/{{ item }}/.bashrc"
        line: 'eval "$(/home/linuxbrew/.linuxbrew/bin/brew shellenv)"'
        regexp: 'brew shellenv'
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: '0644'
        state: present
      loop: "{{ desktop_user_names }}"

    - name: Install gh via Homebrew
      ansible.builtin.shell:
        cmd: /home/linuxbrew/.linuxbrew/bin/brew install gh
        creates: /home/linuxbrew/.linuxbrew/bin/gh
      become: false

    - name: Install fnm via Homebrew
      ansible.builtin.shell:
        cmd: /home/linuxbrew/.linuxbrew/bin/brew install fnm
        creates: /home/linuxbrew/.linuxbrew/bin/fnm
      become: false

    - name: Configure fnm in shell profile for {{ desktop_user_names | join(', ') }}
      ansible.builtin.lineinfile:
        path: "/home/{{ item }}/.bashrc"
        line: 'eval "$(/home/linuxbrew/.linuxbrew/bin/fnm env --use-on-cd)"'
        regexp: 'fnm env'
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: '0644'
        state: present
      loop: "{{ desktop_user_names }}"

    - name: Install Node 24 via fnm for {{ desktop_user_names | join(', ') }}
      ansible.builtin.shell:
        cmd: /home/linuxbrew/.linuxbrew/bin/fnm install 24
        creates: "/home/{{ item }}/.local/share/fnm/node-versions/v24"
      become_user: "{{ item }}"
      environment:
        HOME: "/home/{{ item }}"
      loop: "{{ desktop_user_names }}"

    - name: Set Node 24 as fnm default for {{ desktop_user_names | join(', ') }}
      ansible.builtin.shell:
        cmd: /home/linuxbrew/.linuxbrew/bin/fnm default 24
      become_user: "{{ item }}"
      environment:
        HOME: "/home/{{ item }}"
      loop: "{{ desktop_user_names }}"
      register: fnm_default
      changed_when: fnm_default.rc == 0

    - name: Configure npm prefix for {{ desktop_user_names | join(', ') }}
      ansible.builtin.lineinfile:
        path: "/home/{{ item }}/.npmrc"
        line: 'prefix=~/.local'
        regexp: '^prefix='
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: '0644'
        state: present
      loop: "{{ desktop_user_names }}"

    - name: Install Claude Code CLI for {{ desktop_user_names | join(', ') }}
      ansible.builtin.shell:
        cmd: eval "$(/home/linuxbrew/.linuxbrew/bin/fnm env --shell bash)" && /home/linuxbrew/.linuxbrew/bin/fnm use 24 && npm install -g @anthropic-ai/claude-code
        creates: "/home/{{ item }}/.local/bin/claude"
      become_user: "{{ item }}"
      environment:
        HOME: "/home/{{ item }}"
      loop: "{{ desktop_user_names }}"

    - name: Install VS Code
      community.general.snap:
        name: code
        classic: true
        state: present

    - name: Remove GNOME remote desktop
      ansible.builtin.apt:
        name: gnome-remote-desktop
        state: absent
      notify: Cleanup apt cache

    - name: Install XFCE desktop and XRDP
      ansible.builtin.apt:
        name:
          - xfce4
          - xfce4-goodies
          - xrdp
        state: present
      notify: Cleanup apt cache

    - name: Start and enable XRDP
      ansible.builtin.service:
        name: xrdp
        state: started
        enabled: true

    - name: Remove light-locker
      ansible.builtin.apt:
        name: light-locker
        state: absent
      notify: Cleanup apt cache

    # NOTE: Notify Restart XRDP must run after XRDP is installed and started (see Install XFCE desktop and XRDP task above)
    - name: Enable XFCE session for {{ desktop_user_names | join(', ') }}
      ansible.builtin.lineinfile:
        path: "/home/{{ item }}/.xsession"
        regexp: '^.*'
        line: xfce4-session
        create: true
        owner: "{{ item }}"
        group: "{{ item }}"
        mode: '0644'
        state: present
      loop: "{{ desktop_user_names }}"
      notify: Restart XRDP
